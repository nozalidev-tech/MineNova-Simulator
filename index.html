</head>



<body>
<div id="loadingScreen">

<div class="loader">

<img src="mine1.jpeg">

<h1>MineNova Simulator</h1>

<p>Loading...</p>

<div class="progress">

<div class="progressFill"></div>

</div>

<small>Please wait...</small>

</div>

</div>


<!-- TOP HEADER -->


<header>


<img src="mine1.jpeg" alt="MineNova Logo">


<h1>MineNova Simulator</h1>


<div class="user-box">
<button id="googleLoginBtn" class="google-btn">
    🔐 Continue with Google
</button>

<p id="username">
User Name
</p>


<p>
Level: <span id="level">1</span>
</p>

<p>
⭐ XP: <span id="xp">0</span>
</p>

<p>
🪙 Coins: <span id="coins">0</span>
</p>


<p>
⚡ Energy: <span id="energy">500</span>
</p>



</div>


</header>





<!-- HOME MINING AREA -->


<main>


<div class="mine-area">


<img src="mine1.jpeg" class="main-logo">


<button id="startMining">

START MINING

</button>


</div>





<!-- CARDS -->


<div class="cards">

<div class="card">

<h2>💰 Earn</h2>

<p>Get Rewards</p>

<button id="rewardBtn">
🎁 Daily Reward
</button>

<p id="rewardMsg"></p>
<p id="rewardTimer"></p>
</div>



<div class="card">

<h2>👛💳 Wallet</h2>

<button onclick="openWallet()">
Open Wallet
</button>

</div>

   <div class="card">
    <h2>🏆 Leaderboard</h2>
    <button onclick="leaderboard()">
Open performance
</button>
   </div>

🏆 Leaderboard


</div> -->
</div>



</main>





<!-- BOTTOM NAV -->


<footer>

    <a href="index.html" class="active">
        <span class="icon">🏠</span>
        <span>Home</span>
    </a>

    <a href="earn.html">
        <span class="icon">💰</span>
        <span>Earn</span>
    </a>

    <a href="shop.html">
        <span class="icon">🛒</span>
        <span>Shop</span>
    </a>

    <a href="profile.html">
        <span class="icon">👤</span>
        <span>Profile</span>
    </a>

    <a href="settings.html">
        <span class="icon">⚙️</span>
        <span>Settings</span>
    </a>

</footer>



<!-- ==========================
     Reward Ad Popup
========================== -->

<div id="rewardPopup" class="popup">

    <div class="popup-content">

        <h2>📺 Advertisement</h2>

        <p>MineNova Partner</p>

        <p>Please watch this ad to claim your reward.</p>

        <h1 id="adTimer">15</h1>

        <button id="watchAdBtn">
            ▶ Watch Ad
        </button>

        <button id="claimRewardBtn" style="display:none;">
            🎁 Claim Reward
        </button>

    </div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDf5BDxRH5V5LQkOGt5wOP-6mrIGOPk2TU",
  authDomain: "minenova-simulator.firebaseapp.com",
  projectId: "minenova-simulator",
  storageBucket: "minenova-simulator.firebasestorage.app",
  messagingSenderId: "73831734825",
  appId: "1:73831734825:web:019674918d83ab98158638"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

console.log("✅ Firebase Connected");
const provider = new GoogleAuthProvider();

const googleBtn = document.getElementById("googleLoginBtn");

googleBtn.addEventListener("click", async () => {

    try{

        const result = await signInWithPopup(auth, provider);

        const user = result.user;

        alert("Welcome " + user.displayName);

        document.getElementById("profileName").innerText = user.displayName;

    }catch(error){

        console.log(error);

        alert(error.message);

    }

});

</script>

<script src="script.js"></script>


</body>
</html>
