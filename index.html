<!DOCTYPE html>

<html lang="en">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>MineNova Simulator</title>


<link rel="stylesheet" href="style.css">


</head>



<body>


<!-- TOP HEADER -->


<header>


<img src="mine1.jpeg" alt="MineNova Logo">


<h1>MineNova Simulator</h1>


<div class="user-box">


<p id="username">
User Name
</p>


<p>
Level: <span id="level">1</span>
</p>

<p>
⭐ XP: <span id="xp">0</span>
</p>

<p>
🪙 Coins: <span id="coins">0</span>
</p>


<p>
⚡ Energy: <span id="energy">500</span>
</p>



</div>


</header>





<!-- HOME MINING AREA -->


<main>


<div class="mine-area">


<img src="mine1.jpeg" class="main-logo">


<button id="startMining">

START MINING

</button>


</div>





<!-- CARDS -->


<div class="cards">

<div class="card">

<h2>💰 Earn</h2>

<p>Get Rewards</p>

<button id="rewardBtn">
🎁 Daily Reward
</button>

<p id="rewardMsg"></p>
<p id="rewardTimer"></p>
</div>



<div class="card">

<h2>👛💳 Wallet</h2>

<button onclick="openWallet()">
Open Wallet
</button>

</div>

   <div class="card">
    <h2>🏆 Leaderboard</h2>
    <button onclick="leaderboard()">
Open performance
</button>
   </div>

<!-- <div class="card" onclick="window.location.href='leaderboard.html'">

🏆 Leaderboard


</div> -->
</div>



</main>





<!-- BOTTOM NAV -->


<footer>

    <a href="index.html" class="active">
        <span class="icon">🏠</span>
        <span>Home</span>
    </a>

    <a href="earn.html">
        <span class="icon">💰</span>
        <span>Earn</span>
    </a>

    <a href="shop.html">
        <span class="icon">🛒</span>
        <span>Shop</span>
    </a>

    <a href="profile.html">
        <span class="icon">👤</span>
        <span>Profile</span>
    </a>

    <a href="settings.html">
        <span class="icon">⚙️</span>
        <span>Settings</span>
    </a>

</footer>



<!-- ==========================
     Reward Ad Popup
========================== -->

<div id="rewardPopup" class="popup">

    <div class="popup-content">

        <h2>📺 Advertisement</h2>

        <p>MineNova Partner</p>

        <p>Please watch this ad to claim your reward.</p>

        <h1 id="adTimer">15</h1>

        <button id="watchAdBtn">
            ▶ Watch Ad
        </button>

        <button id="claimRewardBtn" style="display:none;">
            🎁 Claim Reward
        </button>

    </div>

</div>

<script src="script.js"></script>


</body>
</html>
