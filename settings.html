<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MineNova - Settings</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">
    <h1>⚙️ Settings</h1>

<div class="card">

   <button id="darkModeBtn" class="setting-btn">
    <span id="darkModeText">🌙 Dark Mode : OFF</span>
    <span>›</span>
</button>

<button id="notificationBtn" class="setting-btn">
<span>🔔 Notifications</span>
<span>›</span>
</button>

<button id="languageBtn" class="setting-btn">
<span>🌐 Language</span>
<span>›</span>
</button>

<button id="contactBtn" class="setting-btn">
<span>📞 Contact Us</span>
<span>›</span>
</button>

<button id="privacyBtn" class="setting-btn">
<span>📜 Privacy Policy</span>
<span>›</span>
</button>

<button id="aboutBtn" class="setting-btn">
<span>ℹ️ About</span>
<span>›</span>
</button>

<button id="rateBtn" class="setting-btn">
<span>⭐ Rate App</span>
<span>›</span>
</button>

<button onclick="history.back()" class="setting-btn">

<span>🏠 Back Home</span>

<span>›</span>

</button>
    </div>

</div>
<!-- ==========================
     SETTINGS POPUP
========================== -->

<div id="settingsPopup" class="popup">

    <div class="popup-content">

        <h2 id="settingsPopupTitle">⚙️ Settings</h2>

        <p id="settingsPopupMessage">
            Coming Soon
        </p>

        <button id="settingsOkBtn">
            OK
        </button>

    </div>

</div>


<script src="settings.js"></script>

</body>
</html>
